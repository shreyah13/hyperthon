<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pennie - Budget Management</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header>
            <h1>Pennie</h1>
            <p class="subtitle">Smart Budget Management</p>
        </header>

        <main>
            <div class="form-container">
                <div class="input-group">
                    <label for="userName">Your Name</label>
                    <input type="text" id="userName" placeholder="Enter your name">
                </div>
                
                <div class="input-group">
                    <label for="monthlySalary">Monthly Salary</label>
                    <input type="number" id="monthlySalary" placeholder="Enter your monthly salary">
                </div>

                <button id="calculateBtn" class="primary-btn">Calculate Budget</button>
            </div>

            <div id="results" class="results-container hidden">
                <h2>Your Budget Distribution</h2>
                <div class="budget-cards">
                    <div class="budget-card">
                        <h3>Wants</h3>
                        <p class="percentage">50%</p>
                        <p class="amount" id="wantsAmount">₹0</p>
                    </div>
                    <div class="budget-card">
                        <h3>Needs</h3>
                        <p class="percentage">30%</p>
                        <p class="amount" id="needsAmount">₹0</p>
                    </div>
                    <div class="budget-card">
                        <h3>Savings</h3>
                        <p class="percentage">20%</p>
                        <p class="amount" id="savingsAmount">₹0</p>
                    </div>
                </div>

                <div class="preference-section">
                    <p>Are you satisfied with these preferences?</p>
                    <div class="preference-buttons">
                        <button id="yesBtn" class="secondary-btn">Yes</button>
                        <button id="noBtn" class="secondary-btn">No</button>
                    </div>
                </div>
            </div>

            <div id="customBudget" class="custom-budget-container hidden">
                <h2>Customize Your Budget</h2>
                <div class="input-group">
                    <label for="rent">Rent</label>
                    <input type="number" id="rent" placeholder="Enter rent amount">
                </div>
                <div class="input-group">
                    <label for="food">Food</label>
                    <input type="number" id="food" placeholder="Enter food expenses">
                </div>
                <div class="input-group">
                    <label for="bills">Bills</label>
                    <input type="number" id="bills" placeholder="Enter bill amount">
                </div>
                <div class="input-group">
                    <label for="travel">Travel</label>
                    <input type="number" id="travel" placeholder="Enter travel expenses">
                </div>
                <div class="input-group">
                    <label for="misc">Miscellaneous</label>
                    <input type="number" id="misc" placeholder="Enter miscellaneous expenses">
                </div>
                <button id="submitCustomBtn" class="primary-btn">Submit Custom Budget</button>
            </div>

            <div id="finalResults" class="final-results-container hidden">
                <h2>Your Final Budget Distribution</h2>
                <div class="budget-details">
                    <div class="budget-item">
                        <span>Rent:</span>
                        <span id="finalRent">₹0</span>
                    </div>
                    <div class="budget-item">
                        <span>Food:</span>
                        <span id="finalFood">₹0</span>
                    </div>
                    <div class="budget-item">
                        <span>Bills:</span>
                        <span id="finalBills">₹0</span>
                    </div>
                    <div class="budget-item">
                        <span>Travel:</span>
                        <span id="finalTravel">₹0</span>
                    </div>
                    <div class="budget-item">
                        <span>Miscellaneous:</span>
                        <span id="finalMisc">₹0</span>
                    </div>
                    <div class="budget-item total">
                        <span>Total Expenses:</span>
                        <span id="finalTotal">₹0</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
